version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: app/Dockerfile
    container_name: deribit_api
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/deribit"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ../:/app

  celery_worker:
    build:
      context: ..
      dockerfile: app/Dockerfile
    container_name: deribit_celery_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/deribit"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "app.core.celery_app", "worker", "-l", "info"]
    volumes:
      - ../:/app

  celery_beat:
    build:
      context: ..
      dockerfile: app/Dockerfile
    container_name: deribit_celery_beat
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/deribit"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "app.core.celery_app", "beat", "-l", "info"]
    volumes:
      - ../:/app

  db:
    image: postgres:16
    container_name: deribit_db
    environment:
      POSTGRES_DB: deribit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - deribit_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: deribit_redis
    ports:
      - "6379:6379"

volumes:
  deribit_pgdata:
